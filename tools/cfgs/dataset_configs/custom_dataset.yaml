DATASET: 'CustomDataset'
DATA_PATH: '/OpenPCDet/erod'

# Which label folder to use under DATA_PATH.
# - 'labels_all': full label set
# - 'labels': (currently) a filtered subset
LABEL_DIR: 'labels'

# If your labels were exported as (x, y, z, width, length, height, heading)
# instead of OpenPCDet's expected (x, y, z, length, width, height, heading),
# set this to True (unconditionally swaps dx/dy).
SWAP_LW: False

# Some datasets have mixed conventions. This option swaps dx/dy only when dy > dx.
SWAP_LW_IF_DY_GT_DX: False

# If heading angles in your label files / infos are in degrees (e.g. 0..360),
# set this to True so they are converted to radians.
# Use `null` to auto-detect (recommended when iterating on labels).
HEADING_IN_DEGREES: null

# Optional heading axis convention fix (degrees).
# If your dataset defines heading=0 along a different axis than KITTI/OpenPCDet
# expects, set this to +/-90, etc.
#HEADING_OFFSET_DEG: -90

# Optional: align this dataset's LiDAR coordinate frame to KITTI-like frame.
# Rotation is applied first, then flips, then translation.
#LIDAR_COORD_TRANSFORM:
#  ENABLE: True
#  ROT_Z_DEG: 90
#  FLIP_X: False
#  FLIP_Y: False
#  TRANSLATION: [0.0, 0.0, 0.0]

# Optional: when using KITTI eval, ignore GT/dets outside POINT_CLOUD_RANGE.
FILTER_EVAL_OUTSIDE_RANGE: True

#POINT_CLOUD_RANGE: [-75.2, -75.2, -4, 75.2, 75.2, 4]
#POINT_CLOUD_RANGE: [-64.64, -64.64, -3.0, 64.64, 64.64, 1.0]
#POINT_CLOUD_RANGE: [0, -39.68, -3, 69.12, 39.68, 1]
#POINT_CLOUD_RANGE: [-32.64, -39.68, -3, 32.64, 39.68, 1]
#POINT_CLOUD_RANGE: [0, -32.0, -3, 52.8, 32.0, 1]
POINT_CLOUD_RANGE: [-32.8, -40.00, -3, 4.00, 40.00, 1]





MAP_CLASS_TO_KITTI: {
    'Vehicle': 'Car',
  'Car': 'Car',
    'Pedestrian': 'Pedestrian',
    'Cyclist': 'Cyclist',
}

DATA_SPLIT: {
    'train': train,
  'test': val_small
}

INFO_PATH: {
    'train': [custom_infos_train.pkl],
    'test': [custom_infos_val.pkl],
}

POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'intensity'],
    src_feature_list: ['x', 'y', 'z', 'intensity'],
}

DATA_AUGMENTOR:
    DISABLE_AUG_LIST: ['placeholder']
    AUG_CONFIG_LIST:
        - NAME: gt_sampling
          USE_ROAD_PLANE: False
          DB_INFO_PATH:
              - custom_dbinfos_train.pkl
          PREPARE: {
             filter_by_min_points: ['Vehicle:5', 'Pedestrian:5', 'Cyclist:5'],
          }

          SAMPLE_GROUPS: ['Vehicle:20', 'Pedestrian:15', 'Cyclist:15']
          NUM_POINT_FEATURES: 4
          DATABASE_WITH_FAKELIDAR: False
          REMOVE_EXTRA_WIDTH: [0.0, 0.0, 0.0]
          LIMIT_WHOLE_SCENE: True

        - NAME: random_world_flip
          ALONG_AXIS_LIST: ['x', 'y']

        - NAME: random_world_rotation
          WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

        - NAME: random_world_scaling
          WORLD_SCALE_RANGE: [0.95, 1.05]

DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: True

    - NAME: shuffle_points
      SHUFFLE_ENABLED: {
        'train': True,
        'test': False
      }

    - NAME: transform_points_to_voxels
      VOXEL_SIZE: [0.05, 0.05, 0.1]
      MAX_POINTS_PER_VOXEL: 45
      MAX_NUMBER_OF_VOXELS: {
        'train': 16000,
        'test': 40000
      }